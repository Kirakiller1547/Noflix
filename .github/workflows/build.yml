name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config cmake \
            libffi-dev libssl-dev libsqlite3-dev \
            automake build-essential ccache \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libgl1-mesa-dev libgles2-mesa-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # Cache Android SDK/NDK + buildozer globaler Ordner -> spart bei jedem
      # weiteren Push viele Minuten Build-Zeit
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache project .buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-project-

      - name: Verify images folder is present
        run: |
          echo "Inhalt von images/:"
          ls -la images/ || echo "WARNUNG: images/ Ordner nicht gefunden!"

      - name: Build with Buildozer
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Noflix-Android-APK
          path: bin/*.apk
